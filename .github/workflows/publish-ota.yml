name: Publish OTA on main

# Whenever a commit lands on main, ship an EAS Update to the `preview` branch
# so installed apps receive the change on their next launch. This is what
# makes the resolver auto-fix loop fully hands-off: hourly health check
# detects a break → opens auto-PR → auto-merges on green checks → this
# workflow publishes the OTA → users recover in minutes.
#
# Escape hatches:
#   - Include "[skip ota]" anywhere in the commit message to skip publishing
#     (useful for docs-only or CI-only changes).
#   - Skip the workflow on a manual change by pushing with the GitHub UI
#     option "Skip workflows" if you ever need it.
#
# Required repo secrets:
#   - EXPO_TOKEN  →  Expo access token with permission to publish updates
#                    to the StreamBox project. Create one at:
#                    https://expo.dev/settings/access-tokens
#                    Add as Settings → Secrets and variables → Actions → New repo secret.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Queue, don't cancel — every commit deserves an update. Cancelling could
  # silently swallow a resolver fix if a docs commit lands seconds later.
  group: publish-ota-main
  cancel-in-progress: false

jobs:
  publish-ota:
    name: Publish OTA to preview branch
    runs-on: ubuntu-latest
    # Honour [skip ota] in the commit message for opt-out commits.
    if: ${{ !contains(github.event.head_commit.message, '[skip ota]') }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Quick safety gate: never ship a broken bundle, even if a human pushed
      # a typo'd change. The resolver auto-PR already ran these, but a manual
      # main push could skip them.
      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Publish update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          MSG=$(git log -1 --pretty=%s)
          SHA=$(git rev-parse --short HEAD)
          npx eas-cli update \
            --branch preview \
            --message "$MSG ($SHA)" \
            --non-interactive
