name: HDFilm Resolver Health

# Runs every hour. The decoder scheme on hdfilmcehennemi.mobi rotates
# unpredictably; daily checks were too slow. On break the workflow tries to
# auto-derive a new scheme from a live HLS manifest oracle (see
# scripts/check-hdfilm-resolver.ts), validates it with typecheck + tests, and
# opens an auto-PR. A failed workflow itself is a notification (GitHub will
# email the repo owner) for the rare case where auto-derivation can't recover.

on:
  schedule:
    # Hourly. 24 runs/day × ~3 min ≈ 72 min/day — comfortably within free quota.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write        # to push the auto-fix branch
  pull-requests: write   # to open the recovery PR

concurrency:
  group: hdfilm-resolver-health
  cancel-in-progress: false

jobs:
  check-hdfilm-resolver:
    name: Check HDFilm resolver
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1. Read-only health check. If healthy, the workflow ends green.
      #    If broken, this step fails (continue-on-error) and we move on.
      - name: Health check (read-only)
        id: health
        run: npm run check:hdfilm
        continue-on-error: true

      # 2. Decoder is broken — try to auto-derive a new scheme against a live
      #    probe. `--write` also patches WebPlayerService.ts in place.
      - name: Auto-derive new scheme (write mode)
        if: steps.health.outcome == 'failure'
        id: derive
        run: npm run check:hdfilm -- --write
        continue-on-error: true

      # 3. Validate the auto-patched source: it must typecheck AND every test
      #    must still pass. If either fails the PR is NOT opened.
      - name: Validate auto-derived scheme
        if: steps.derive.outcome == 'success'
        id: validate
        run: |
          set -e
          npm run typecheck
          npm test
        continue-on-error: true

      # 4. Open an auto-PR with the validated fix and enable auto-merge so it
      #    lands on main as soon as required checks pass. The push to main is
      #    picked up by `.github/workflows/publish-ota.yml`, which publishes
      #    the OTA — closing the loop with zero human action.
      - name: Open auto-fix PR
        if: steps.derive.outcome == 'success' && steps.validate.outcome == 'success'
        id: open_pr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "fix(resolver): auto-derived new HDFilm decoder scheme"
          title: "🤖 Auto-fix: HDFilm decoder scheme rotation"
          body: |
            The HDFilm resolver health check detected that the provider rotated
            their on-page `dc_*()` deobfuscation scheme. A new pre-unmix
            transform was auto-derived by brute-forcing compositions of the
            known primitives (`reverse` / `b64` / `rot13`) against a live HLS
            manifest oracle, and validated with:

            - `npm run typecheck`
            - `npm test`

            The new transform was inserted at the **front** of
            `RAPIDRAME_PRE_UNMIX_TRANSFORMS` in `src/services/WebPlayerService.ts`
            so it's tried first. The previous transforms are kept as fallbacks
            in case the provider flips back.

            **Auto-merge enabled.** When required checks pass, this PR merges
            itself and the `publish-ota.yml` workflow ships the fix to users.

            Generated by `.github/workflows/hdfilm-resolver-health.yml`.
          branch: auto/hdfilm-decoder-update
          delete-branch: true
          labels: |
            auto-generated
            resolver

      # 4b. Merge the auto-fix PR immediately. The change is already validated
      #     by a live #EXTM3U oracle + typecheck + tests, so we skip the human
      #     review step on this specific narrow path. The merge to main is
      #     picked up by `publish-ota.yml`, which ships the OTA in minutes.
      #     If you ever want to add a human gate, replace --squash with --auto
      #     (requires repo "Allow auto-merge" setting + branch protection).
      - name: Merge the auto-fix PR
        if: steps.open_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --delete-branch "${{ steps.open_pr.outputs.pull-request-number }}"

      # 5. Auto-derive failed (new scheme isn't a composition of known
      #    primitives). Fail loudly so the GitHub failure notification reaches
      #    the maintainer for manual fix.
      - name: Fail loudly if not recovered
        if: |
          steps.health.outcome == 'failure' &&
          (steps.derive.outcome != 'success' || steps.validate.outcome != 'success')
        run: |
          echo "::error::HDFilm decoder is BROKEN and auto-recovery did not succeed."
          echo "Steps to fix manually:"
          echo "  1. Open https://hdfilmcehennemi.mobi/video/embed/ANY_REAL_ID/"
          echo "  2. Find the inline 'function dc_xxx(value_parts) {' helper."
          echo "  3. Translate it into a new RAPIDRAME_PRE_UNMIX_TRANSFORMS entry"
          echo "     (see scripts/check-hdfilm-resolver.ts for the primitive map)."
          exit 1
