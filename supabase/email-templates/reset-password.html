<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Your StreamBox Password</title>
</head>
<body style="margin: 0; padding: 0; background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #000000; min-height: 100vh;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 480px; background-color: #121212; border-radius: 16px; border: 1px solid #2A2A2A;">
          <!-- Header -->
          <tr>
            <td style="padding: 36px 32px 20px; text-align: center;">
              <div style="width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 28px; background-color: rgba(255, 77, 0, 0.2); line-height: 56px; font-size: 24px;">
                &#128272;
              </div>
              <h1 style="margin: 0; color: #FFFFFF; font-size: 24px; font-weight: 800; letter-spacing: -0.5px;">
                Reset Your Password
              </h1>
              <p style="margin: 10px 0 0; color: #808080; font-size: 14px; line-height: 20px;">
                Use the code below to set a new password
              </p>
            </td>
          </tr>
          <!-- Code -->
          <tr>
            <td style="padding: 0 32px;">
              <div style="background-color: #171717; border: 1px solid #2A2A2A; border-radius: 12px; padding: 24px; text-align: center;">
                <p style="margin: 0 0 8px; color: #808080; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;">
                  Your reset code
                </p>
                <p style="margin: 0; color: #FFFFFF; font-size: 32px; font-weight: 800; letter-spacing: 6px; font-family: monospace;">
                  {{ .Token }}
                </p>
              </div>
            </td>
          </tr>
          <!-- Info -->
          <tr>
            <td style="padding: 24px 32px 36px;">
              <p style="margin: 0; color: #808080; font-size: 13px; line-height: 20px; text-align: center;">
                Enter this code in the StreamBox app along with your new password. This code expires in <strong style="color: #FFFFFF;">60 minutes</strong>.
              </p>
              <hr style="border: none; border-top: 1px solid #2A2A2A; margin: 24px 0;">
              <p style="margin: 0; color: #555555; font-size: 11px; line-height: 16px; text-align: center;">
                If you didn't request a password reset, your account is safe — no action needed.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
